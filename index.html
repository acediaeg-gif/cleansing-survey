<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>클렌징 안내</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #f7f8f5;
      color: #111;
    }

    .page {
      min-height: 100vh;
      padding: 18px;
      box-sizing: border-box;
    }

    .language-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .language-card {
      border-radius: 16px;
      border: 1px solid #ddd;
      padding: 18px;
      min-height: 680px;
      box-sizing: border-box;
      scroll-margin-top: 14px;
    }

    .ko {
      border-color: #f2a1b1;
      background: #fff7f8;
    }

    .zh {
      border-color: #b7d7a0;
      background: #f8fcf4;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
    }

    .vi {
      border-color: #a8cfee;
      background: #f4fbff;
    }

    .language-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 22px;
      flex-wrap: nowrap;
      align-items: center;
    }

    .language-tab {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 6px 7px;
      border-radius: 9px;
      background: white;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
      line-height: 1;
    }

    .language-tab img {
      width: 18px;
      height: 18px;
      object-fit: contain;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .ko .language-tab {
      border: 1px solid #e94d6b;
      color: #d94663;
    }

    .zh .language-tab {
      border: 1px solid #5b963b;
      color: #4f8c30;
    }

    .vi .language-tab {
      border: 1px solid #1479c8;
      color: #1372bd;
    }

    .intro-text {
      margin: 0 0 28px;
      text-align: center;
      font-size: 24px;
      font-weight: 900;
      line-height: 1.45;
    }

    .ko .highlight {
      color: #e94d6b;
    }

    .zh .highlight {
      color: #4f8c30;
      font-weight: 900;
    }

    .vi .highlight {
      color: #1479c8;
    }

    .question-banner {
      width: 100%;
      margin-bottom: 24px;
      padding: 16px 12px;
      border: 0;
      border-radius: 8px;
      color: white;
      text-align: center;
      font-size: 25px;
      font-weight: 900;
      line-height: 1.35;
      cursor: pointer;
      box-sizing: border-box;
      transition: box-shadow 0.2s ease, transform 0.2s ease, filter 0.2s ease;
    }

    .question-banner:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
    }

    .question-banner:active {
      transform: scale(0.98);
    }

    .ko .question-banner {
      background: #e94d6b;
    }

    .zh .question-banner {
      background: #5b963b;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
      font-weight: 900;
      text-shadow: 0.4px 0 0 #ffffff, -0.4px 0 0 #ffffff;
    }

    .vi .question-banner {
      background: #1479c8;
      font-size: 18px;
      line-height: 1.25;
    }

    .question-banner.clicked {
      animation: softGlow 0.55s ease;
    }

    @keyframes softGlow {
      45% {
        box-shadow: 0 0 22px rgba(255, 255, 255, 0.95), 0 0 30px currentColor;
      }
    }

    .concern-row {
      display: grid;
      grid-template-columns: 105px 1fr;
      gap: 18px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px dashed rgba(0, 0, 0, 0.18);
    }

    .concern-image {
      width: 105px;
      height: 105px;
      border-radius: 50%;
      object-fit: cover;
      background: #eee;
    }

    .concern-text {
      font-size: 22px;
      line-height: 1.35;
      font-weight: 900;
    }

    .concern-title {
      display: block;
      font-weight: 900;
    }

    .concern-desc {
      display: block;
      color: #111;
      font-weight: 900;
    }

    .ko .concern-title {
      color: #e94d6b;
    }

    .zh .concern-title {
      color: #4f8c30;
    }

    .vi .concern-title {
      color: #1479c8;
    }

    .vi .concern-text {
      font-size: 18px;
      line-height: 1.28;
    }

    .routine-page {
      max-width: 1180px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 22px;
      box-sizing: border-box;
    }

    .routine-page.zh,
    .modal-card.zh {
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
    }

    .routine-page.zh .routine-title,
    .routine-page.zh .routine-subtitle,
    .routine-page.zh .product-name,
    .routine-page.zh .product-brand,
    .routine-page.zh .product-price,
    .routine-page.zh .product-point,
    .routine-page.zh .product-desc,
    .routine-page.zh .product-list li,
    .routine-page.zh .routine-tip,
    .modal-card.zh .modal-title,
    .modal-card.zh .modal-brand,
    .modal-card.zh .modal-price,
    .modal-card.zh .modal-point,
    .modal-card.zh .modal-desc,
    .modal-card.zh .modal-list li {
      font-weight: 900 !important;
      text-shadow: 0.25px 0 0 currentColor;
    }

    .routine-header {
      text-align: center;
      margin-bottom: 18px;
    }

    .routine-flag {
      width: 36px;
      height: 24px;
      object-fit: contain;
      margin-bottom: 6px;
    }

    .routine-title {
      margin: 0;
      font-size: 30px;
      font-weight: 900;
      line-height: 1.25;
    }

    .routine-subtitle {
      margin: 6px 0 0;
      font-size: 16px;
      font-weight: 800;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .product-card {
      border: 1px solid #f2cfd8;
      border-radius: 8px;
      padding: 14px;
      text-align: center;
      box-sizing: border-box;
      min-height: 520px;
      cursor: pointer;
      background: white;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.12);
    }

    .product-card.orange {
      border-color: #ffd7a3;
    }

    .product-card.green {
      border-color: #c8e1bb;
    }

    .product-card.blue {
      border-color: #c3d9f3;
    }

    .product-number {
      display: inline-block;
      color: white;
      padding: 5px 8px;
      border-radius: 5px;
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .pink .product-number {
      background: #e62f65;
    }

    .orange .product-number {
      background: #ff9f12;
    }

    .green .product-number {
      background: #2f7d37;
    }

    .blue .product-number {
      background: #1b65b9;
    }

    .product-name {
      margin: 0;
      font-size: 20px;
      font-weight: 900;
      line-height: 1.25;
    }

    .pink .product-name,
    .pink .product-price,
    .pink .product-point {
      color: #e62f65;
    }

    .orange .product-name,
    .orange .product-price,
    .orange .product-point {
      color: #ff8a00;
    }

    .green .product-name,
    .green .product-price,
    .green .product-point {
      color: #2f7d37;
    }

    .blue .product-name,
    .blue .product-price,
    .blue .product-point {
      color: #1b65b9;
    }

    .product-brand {
      margin: 6px 0 10px;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.3;
    }

    .product-image {
      width: 100%;
      height: 150px;
      object-fit: contain;
      margin: 4px 0 8px;
    }

    .product-price {
      font-size: 20px;
      font-weight: 900;
      margin: 0 0 10px;
    }

    .product-point {
      font-size: 15px;
      font-weight: 900;
      line-height: 1.35;
      margin: 0 0 10px;
    }

    .product-desc {
      font-size: 13px;
      font-weight: 800;
      line-height: 1.45;
      margin: 0 0 12px;
    }

    .product-list {
      padding: 0;
      margin: 0;
      list-style: none;
      text-align: left;
    }

    .product-list li {
      position: relative;
      padding-left: 18px;
      margin-bottom: 7px;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.35;
    }

    .product-list li::before {
      content: "✓";
      position: absolute;
      left: 0;
      top: 0;
      font-weight: 900;
    }

    .pink .product-list li::before {
      color: #e62f65;
    }

    .orange .product-list li::before {
      color: #ff8a00;
    }

    .green .product-list li::before {
      color: #2f7d37;
    }

    .blue .product-list li::before {
      color: #1b65b9;
    }

    .routine-tip {
      margin-top: 14px;
      padding: 14px;
      border-radius: 8px;
      background: #fff0f3;
      color: #e62f65;
      text-align: center;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.45;
    }

    .routine-actions {
      margin-top: 18px;
      text-align: center;
    }

    .benefit-button {

      border-radius: 999px;
      padding: 14px 22px;
      background: #e62f65;
      color: white;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(230, 47, 101, 0.24);
    }

    .benefit-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
    }

    .benefit-click {
      display: inline-block;
      margin-left: 8px;
      padding: 3px 7px;
      border-radius: 999px;
      background: white;
      color: #e62f65;
      font-size: 11px;
      font-weight: 900;
      vertical-align: middle;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.48);
      box-sizing: border-box;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-card {
      position: relative;
      width: min(720px, 100%);
      max-height: 92vh;
      overflow-y: auto;
      background: white;
      border-radius: 14px;
      padding: 26px;
      box-sizing: border-box;
      text-align: center;
      animation: modalPop 0.24s ease;
    }

    @keyframes modalPop {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(18px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 50%;
      background: #111;
      color: white;
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
    }

    .modal-image {
      width: 100%;
      max-width: 360px;
      height: 260px;
      object-fit: contain;
      margin: 12px auto;
      display: block;
    }

    .modal-title {
      margin: 6px 0 6px;
      font-size: 30px;
      font-weight: 900;
      line-height: 1.25;
    }

    .modal-brand {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.35;
    }

    .modal-price {
      margin: 0 0 12px;
      font-size: 26px;
      font-weight: 900;
    }

    .modal-point {
      margin: 0 0 10px;
      font-size: 20px;
      font-weight: 900;
      line-height: 1.4;
    }

    .modal-desc {
      margin: 0 0 14px;
      font-size: 16px;
      font-weight: 800;
      line-height: 1.5;
    }

    .modal-list {
      max-width: 440px;
      margin: 0 auto;
      padding: 0;
      list-style: none;
      text-align: left;
    }

    .modal-list li {
      position: relative;
      padding-left: 22px;
      margin-bottom: 9px;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.4;
    }

    .modal-list li::before {
      content: "✓";
      position: absolute;
      left: 0;
      top: 0;
      font-weight: 900;
    }

    .benefits-page {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-sizing: border-box;

      text-align: center;
      margin-bottom: 16px;

    .benefits-flag {
      width: 38px;
      height: 26px;

      margin-bottom: 8px;

    .benefits-title {
      margin: 0;
      font-size: 28px;
      font-weight: 900;
      color: #e62f65;
    }

    .benefit-image {
      width: 100%;
      display: block;
      border-radius: 10px;
      margin-bottom: 18px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.08);
    }

    @media (max-width: 1000px) {
      .language-grid {
        grid-template-columns: 1fr;
      }

      .language-card {
        min-height: auto;
      }

      .product-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 520px) {
      .page {
        padding: 12px;
      }

      .language-card {
        padding: 14px;
      }

      .language-tabs {
        gap: 5px;
      }

      .language-tab {
        font-size: 12px;
        padding: 6px 6px;
        gap: 4px;
      }

      .language-tab img {
        width: 17px;
        height: 17px;
      }

      .intro-text {
        font-size: 21px;
      }

      .question-banner {
        font-size: 22px;
      }

      .vi .question-banner {
        font-size: 17px;
      }

      .concern-row {
        grid-template-columns: 82px 1fr;
        gap: 14px;
      }

      .concern-image {
        width: 80px;
        height: 80px;
      }

      .concern-text {
        font-size: 18px;
      }

      .vi .concern-text {
        font-size: 15px;
      }

      .routine-page {
        padding: 14px;
      }

      .routine-title {
        font-size: 23px;
      }

      .routine-subtitle {
        font-size: 13px;
      }

      .product-grid {
        grid-template-columns: 1fr;
      }

      .product-card {
        min-height: auto;
      }

      .product-image {
        height: 170px;
      }

      .modal-card {
        padding: 22px 18px;
      }

      .modal-title {
        font-size: 24px;
      }

      .modal-image {
        height: 220px;
      }

      .modal-point {
        font-size: 18px;
      }

      .benefits-page {
        padding: 12px;
      }

      .benefits-title {
        font-size: 23px;
      }
    }
  </style>
</head>

        ]

    };

    function makeLanguageTabs() {
      return '<div class="language-tabs">' + languageTabs.map(function(tab) {
        return '<button class="language-tab" type="button" onclick="scrollToLanguage(\'' + tab.code + '\')"><img src="' + tab.flag + '" alt=""><span>' + tab.label + '</span></button>';
      }).join("") + '</div>';
    }

    function scrollToLanguage(language) {
      const target = document.getElementById("card-" + language);

      if (target) {
        target.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    function showLanguageScreen(saveHistory = false) {
      if (saveHistory) {
        history.pushState({ screen: "home" }, "");
      }

      app.innerHTML = "";

      const grid = document.createElement("div");
      grid.className = "language-grid";

      Object.keys(cards).forEach(function(language) {
        const data = cards[language];
        const card = document.createElement("div");
        card.className = "language-card " + language;
        card.id = "card-" + language;

        card.innerHTML =
          makeLanguageTabs() +
          '<p class="intro-text">' + data.intro + '</p>' +
          '<button class="question-banner" type="button">' + data.banner + '</button>' +
          data.concerns.map(function(item) {
            return '<div class="concern-row"><img class="concern-image" src="' + item[0] + '" alt=""><div class="concern-text"><span class="concern-title">' + item[1] + '</span><span class="concern-desc">' + item[2] + '</span></div></div>';
          }).join("");

        const bannerButton = card.querySelector(".question-banner");

        bannerButton.addEventListener("click", function() {
          bannerButton.classList.add("clicked");

          setTimeout(function() {
            showRoutineScreen(language, true);
          }, 350);
        });

        grid.appendChild(card);
      });

      app.appendChild(grid);
      window.scrollTo({ top: 0, behavior: "auto" });
    }

    function showRoutineScreen(language, saveHistory = true) {
      if (saveHistory) {
        history.pushState({ screen: "routine", language: language }, "");
      }

      const data = routines[language];

      app.innerHTML =
        '<section class="routine-page ' + language + '">' +
          '<header class="routine-header"><img class="routine-flag" src="' + data.flag + '" alt=""><h1 class="routine-title">' + data.title + '</h1><p class="routine-subtitle">' + data.subtitle + '</p></header>' +
          '<div class="product-grid">' +
            data.products.map(function(product, index) {
              return '<article class="product-card ' + product.color + '" onclick="openProductModal(\'' + language + '\',' + index + ')"><div class="product-number">' + product.number + '</div><h2 class="product-name">' + product.name + '</h2><p class="product-brand">' + product.brand + '</p><img class="product-image" src="' + product.image + '" alt=""><p class="product-price">' + product.price + '</p><p class="product-point">' + product.point + '</p><p class="product-desc">' + product.desc + '</p><ul class="product-list">' + product.list.map(function(item) { return '<li>' + item + '</li>'; }).join("") + '</ul></article>';
            }).join("") +
          '</div>' +
          '<div class="routine-tip">' + data.tip + '</div>' +
          '<div class="routine-actions"><button class="benefit-button" onclick="showBenefitsScreen(\'' + language + '\', true)">' + data.benefitText + '<span class="benefit-click">CLICK</span></button></div>' +
          '<div id="productModal" class="modal-overlay" onclick="closeProductModal(event)"></div>' +
        '</section>';

      window.scrollTo({ top: 0, behavior: "auto" });
    }

    function showBenefitsScreen(language, saveHistory = true) {
      if (saveHistory) {
        history.pushState({ screen: "benefits", language: language }, "");
      }

      const data = routines[language];

      app.innerHTML =
        '<section class="benefits-page ' + language + '">' +
          '<header class="benefits-header"><img class="benefits-flag" src="' + data.flag + '" alt=""><h1 class="benefits-title">' + data.benefitText + '</h1></header>' +
          '<img class="benefit-image" src="' + data.benefitImages[0] + '" alt="">' +
          '<img class="benefit-image" src="' + data.benefitImages[1] + '" alt="">' +
        '</section>';

      window.scrollTo({ top: 0, behavior: "auto" });
    }

    function openProductModal(language, index) {
      const routine = routines[language];
      const product = routine.products[index];
      const modal = document.getElementById("productModal");

      modal.className = "modal-overlay show";
      modal.innerHTML =
        '<div class="modal-card ' + product.color + ' ' + language + '" onclick="event.stopPropagation()">' +
          '<button class="modal-close" onclick="closeProductModal()">&times;</button>' +
          '<div class="product-number">' + product.number + '</div>' +
          '<h2 class="modal-title product-name">' + product.name + '</h2>' +
          '<p class="modal-brand">' + product.brand + '</p>' +
          '<img class="modal-image" src="' + product.image + '" alt="">' +
          '<p class="modal-price product-price">' + product.price + '</p>' +
          '<p class="modal-point product-point">' + product.point + '</p>' +
          '<p class="modal-desc">' + product.desc + '</p>' +
          '<ul class="modal-list product-list">' + product.list.map(function(item) { return '<li>' + item + '</li>'; }).join("") + '</ul>' +
        '</div>';
    }

    function closeProductModal(event) {
      if (event && event.target !== event.currentTarget) {
        return;
      }

      const modal = document.getElementById("productModal");

      if (modal) {
        modal.className = "modal-overlay";
        modal.innerHTML = "";
      }
    }

    window.addEventListener("popstate", function(event) {
      const state = event.state;

      if (!state || state.screen === "home") {
        showLanguageScreen(false);
        return;
      }

      if (state.screen === "routine") {
        showRoutineScreen(state.language, false);
        return;
      }

      if (state.screen === "benefits") {
        showBenefitsScreen(state.language, false);
        return;
      }
    });

    history.replaceState({ screen: "home" }, "");
    showLanguageScreen(false);
  </script>
</body>
</html>
