<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>클렌징 안내</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #f7f8f5;
      color: #111;
    }

    .page {
      min-height: 100vh;
      padding: 18px;
      box-sizing: border-box;
    }

    .language-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .language-card {
      border-radius: 16px;
      border: 1px solid #ddd;
      padding: 18px;
      min-height: 680px;
      box-sizing: border-box;
    }

    .ko {
      border-color: #f2a1b1;
      background: #fff7f8;
    }

    .zh {
      border-color: #b7d7a0;
      background: #f8fcf4;
    }

    .vi {
      border-color: #a8cfee;
      background: #f4fbff;
    }

    .language-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 10px;
      background: white;
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 22px;
    }

    .language-flag {
      width: 24px;
      height: 24px;
      object-fit: cover;
      border-radius: 3px;
    }

    .ko .language-label {
      color: #d94663;
      border: 1px solid #e94d6b;
    }

    .zh .language-label {
      color: #4f8c30;
      border: 1px solid #5b963b;
    }

    .vi .language-label {
      color: #1372bd;
      border: 1px solid #1479c8;
    }

    .intro-text {
      margin: 0 0 28px;
      text-align: center;
      font-size: 24px;
      font-weight: 800;
      line-height: 1.45;
    }

    .ko .highlight {
      color: #e94d6b;
    }

    .zh .highlight {
      color: #4f8c30;
    }

    .vi .highlight {
      color: #1479c8;
    }

    .question-banner {
      width: 100%;
      margin-bottom: 24px;
      padding: 16px 12px;
      border: 0;
      border-radius: 8px;
      color: white;
      text-align: center;
      font-size: 25px;
      font-weight: 800;
      line-height: 1.35;
      cursor: pointer;
      box-sizing: border-box;
      transition: box-shadow 0.2s ease, transform 0.2s ease, filter 0.2s ease;
    }

    .question-banner:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
    }

    .question-banner:active {
      transform: scale(0.98);
    }

    .ko .question-banner {
      background: #e94d6b;
    }

    .zh .question-banner {
      background: #5b963b;
    }

    .vi .question-banner {
      background: #1479c8;
    }

    .question-banner.clicked {
      animation: softGlow 0.55s ease;
    }

    @keyframes softGlow {
      0% {
        box-shadow: 0 0 0 rgba(255, 255, 255, 0);
      }

      45% {
        box-shadow: 0 0 22px rgba(255, 255, 255, 0.95), 0 0 30px currentColor;
      }

      100% {
        box-shadow: 0 0 0 rgba(255, 255, 255, 0);
      }
    }

    .concern-row {
      display: grid;
      grid-template-columns: 105px 1fr;
      gap: 18px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px dashed rgba(0, 0, 0, 0.18);
    }

    .concern-row:last-child {
      border-bottom: 0;
    }

    .concern-image {
      width: 105px;
      height: 105px;
      border-radius: 50%;
      object-fit: cover;
      background: #eee;
    }

    .concern-text {
      font-size: 22px;
      line-height: 1.35;
      font-weight: 800;
    }

    .ko .concern-title {
      color: #e94d6b;
    }

    .zh .concern-title {
      color: #4f8c30;
    }

    .vi .concern-title {
      color: #1479c8;
    }

    .concern-text span {
      display: block;
      color: #111;
      font-weight: 500;
    }

    .next-screen {
      max-width: 560px;
      margin: 40px auto;
      padding: 32px;
      background: white;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .next-screen h1 {
      font-size: 26px;
      margin: 0 0 18px;
    }

    .next-screen p {
      font-size: 18px;
      line-height: 1.6;
    }

    .back-button {
      border: 0;
      border-radius: 8px;
      padding: 12px 18px;
      background: #333;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    @media (max-width: 1000px) {
      .language-grid {
        grid-template-columns: 1fr;
      }

      .language-card {
        min-height: auto;
      }
    }

    @media (max-width: 520px) {
      .page {
        padding: 12px;
      }

      .language-card {
        padding: 14px;
      }

      .language-label {
        font-size: 17px;
      }

      .language-flag {
        width: 23px;
        height: 23px;
      }

      .intro-text {
        font-size: 21px;
      }

      .question-banner {
        font-size: 22px;
      }

      .concern-row {
        grid-template-columns: 82px 1fr;
        gap: 14px;
      }

      .concern-image {
        width: 80px;
        height: 80px;
      }

      .concern-text {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <main id="app" class="page"></main>

  <script>
    const app = document.getElementById("app");

    const cards = {
      ko: {
        flag: "kr.jpg",
        label: "한국어",
        intro: '몇 번을 지워도 남아있는 <span class="highlight">메이크업</span><br>폼클렌저로 지우기 힘든 <span class="highlight">선크림</span>',
        banner: "클렌징할 때마다 고민이라면?",
        nextTitle: "한국어 화면",
        nextText: "다음 화면 내용을 여기에 새로 만들 예정입니다.",
        concerns: [
          ["skin-makeup.jpg", "제대로", "세정되지 않은 메이크업"],
          ["skin-pores.jpg", "꽉 찬 블랙헤드로", "늘어난 모공"],
          ["skin-sensitive.jpg", "민감한 피부를", "자극하는 클렌징"],
          ["skin-sebum.jpg", "모공 속 쌓이는", "피지와 노폐물"]
        ]
      },

      zh: {
        flag: "cn.jpg",
        label: "中文(简体)",
        intro: '即使反复清洗，彩妆依然有<span class="highlight">残留</span><br>仅用泡沫洁面难以彻底洗净<span class="highlight">防晒</span>',
        banner: "每次卸妆都有这些烦恼吗？",
        nextTitle: "中文页面",
        nextText: "下一页内容将在这里重新制作。",
        concerns: [
          ["skin-makeup.jpg", "彩妆残留，", "卸不彻底"],
          ["skin-pores.jpg", "黑头堆积，", "毛孔粗大"],
          ["skin-sensitive.jpg", "卸妆过程中", "容易刺激敏感肌肤"],
          ["skin-sebum.jpg", "毛孔内堆积", "油脂和老废角质"]
        ]
      },

      vi: {
        flag: "viet.jpg",
        label: "Tiếng Việt",
        intro: 'Trang điểm vẫn còn <span class="highlight">sót lại</span> dù đã rửa nhiều lần<br>Kem chống nắng <span class="highlight">khó làm sạch</span> chỉ bằng sữa rửa mặt',
        banner: "Bạn có gặp những vấn đề này khi làm sạch da không?",
        nextTitle: "Màn hình tiếng Việt",
        nextText: "Nội dung tiếp theo sẽ được tạo mới tại đây.",
        concerns: [
          ["skin-makeup.jpg", "Cặn trang điểm", "còn sót lại"],
          ["skin-pores.jpg", "Mụn đầu đen", "tích tụ, lỗ chân lông to hơn"],
          ["skin-sensitive.jpg", "Làm sạch dễ gây", "kích ứng cho da nhạy cảm"],
          ["skin-sebum.jpg", "Dầu thừa và", "tế bào chết tích tụ trong lỗ chân lông"]
        ]
      }
    };

    function showLanguageScreen() {
      app.innerHTML = "";

      const grid = document.createElement("div");
      grid.className = "language-grid";

      Object.keys(cards).forEach(function(language) {
        const data = cards[language];

        const card = document.createElement("div");
        card.className = "language-card " + language;

        card.innerHTML =
          '<div class="language-label">' +
            '<img class="language-flag" src="' + data.flag + '" alt="">' +
            data.label +
          '</div>' +
          '<p class="intro-text">' + data.intro + '</p>' +
          '<button class="question-banner" type="button">' + data.banner + '</button>' +
          data.concerns.map(function(item) {
            return (
              '<div class="concern-row">' +
                '<img class="concern-image" src="' + item[0] + '" alt="">' +
                '<div class="concern-text">' +
                  '<span class="concern-title">' + item[1] + '</span>' +
                  '<span>' + item[2] + '</span>' +
                '</div>' +
              '</div>'
            );
          }).join("");

        const bannerButton = card.querySelector(".question-banner");

        bannerButton.addEventListener("click", function() {
          bannerButton.classList.add("clicked");

          setTimeout(function() {
            showNextScreen(language);
          }, 350);
        });

        grid.appendChild(card);
      });

      app.appendChild(grid);
    }

    function showNextScreen(language) {
      const data = cards[language];

      app.innerHTML =
        '<section class="next-screen">' +
          '<h1>' + data.nextTitle + '</h1>' +
          '<p>' + data.nextText + '</p>' +
          '<button class="back-button" onclick="showLanguageScreen()">처음 화면으로</button>' +
        '</section>';
    }

    showLanguageScreen();
  </script>
</body>
</html>
